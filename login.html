<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — WaFlow</title>
  <link rel="stylesheet" href="auth.css"/>
  <style>
    .demo-pills{display:flex;gap:8px;flex-wrap:wrap}
    .demo-pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;font-family:var(--font-b)}
    .demo-pill:hover{border-color:var(--green);color:var(--green)}
    .demo-pill strong{color:var(--green)}
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-grid-bg"></div><div class="auth-glow"></div>
  <div class="auth-card fade-up">
    <a href="index.html" class="auth-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#00e676"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a5.26 5.26 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      <span>WaFlow</span>
    </a>
    <div class="card">
      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-sub">WaFlow account mein login karein</p>
      <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:20px">
        <div style="font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">⚡ Quick Demo</div>
        <div class="demo-pills">
          <button class="demo-pill" onclick="fillDemo('user@demo.com','demo1234')">👤 <strong>User</strong> Demo</button>
          <button class="demo-pill" onclick="fillDemo('admin@waflow.com','admin1234')">🛡️ <strong>Admin</strong> Demo</button>
        </div>
      </div>
      <button class="btn google-btn" id="googleBtn" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5.1l-6.3-5.1C29.3 35.3 26.8 36 24 36c-5.2 0-9.6-3.3-11.2-8H6.2C9.5 39.4 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.2-2.3 4.1-4.3 5.4l6.3 5.1C40.9 35.3 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
        Google se Login karo
      </button>
      <div class="auth-divider">ya email se</div>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
            <input type="email" id="loginEmail" class="form-input has-icon" placeholder="aap@business.com"/>
          </div>
          <div class="form-error" id="eErr">Valid email daalo</div>
        </div>
        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <label class="form-label" style="margin:0">Password</label>
            <a href="forgot-password.html" style="font-size:12px;color:var(--green);text-decoration:none">Bhool gaye?</a>
          </div>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="loginPw" class="form-input has-icon" placeholder="••••••••"/>
            <button type="button" class="password-toggle" onclick="togglePw()">
              <svg id="eyeIco" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="form-error" id="pErr">Password daalo</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
          <input type="checkbox" id="rem" style="accent-color:var(--green);width:14px;height:14px"/>
          <label for="rem" style="font-size:13px;color:var(--muted);cursor:pointer">Mujhe yaad rakho</label>
        </div>
        <div id="loginErr" style="display:none;background:#ff3d5714;border:1px solid #ff3d5730;border-radius:8px;padding:11px 14px;color:var(--red);font-size:13px;margin-bottom:16px"></div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Login karein →</button>
      </form>
      <p class="auth-footer">Account nahi? <a href="signup.html">Sign up karein</a></p>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script>
let _v=false;
window.togglePw=()=>{_v=!_v;document.getElementById('loginPw').type=_v?'text':'password';document.getElementById('eyeIco').innerHTML=_v?'<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>':'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';};
window.fillDemo=(e,p)=>{document.getElementById('loginEmail').value=e;document.getElementById('loginPw').value=p;const t=document.createElement('div');t.className='toast info';t.innerHTML='<span>ℹ️</span><span>Demo credentials filled!</span>';document.getElementById('toast-container').appendChild(t);setTimeout(()=>t.remove(),2000);};
</script>
<script type="module">
import{auth,db}from"./firebase-config.js";
import{redirectIfLoggedIn}from"./auth-guard.js";
import{signInWithEmailAndPassword,GoogleAuthProvider,signInWithPopup,setPersistence,browserLocalPersistence,browserSessionPersistence}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
redirectIfLoggedIn();
const toast=(m,t='success')=>{const el=document.createElement('div');el.className=`toast ${t}`;el.innerHTML=`<span>${{success:'✅',error:'❌',info:'ℹ️'}[t]}</span><span>${m}</span>`;document.getElementById('toast-container').appendChild(el);setTimeout(()=>el.remove(),3000);};
async function redir(uid){const s=await getDoc(doc(db,'users',uid));window.location.href=s.exists()&&s.data().role==='admin'?'admin.html':'dashboard.html';}
document.getElementById('loginForm').addEventListener('submit',async e=>{
  e.preventDefault();const email=document.getElementById('loginEmail').value.trim(),pw=document.getElementById('loginPw').value,rem=document.getElementById('rem').checked;
  const btn=document.getElementById('loginBtn'),eb=document.getElementById('loginErr');
  let ok=true;
  if(!email||!/\S+@\S+\.\S+/.test(email)){document.getElementById('loginEmail').classList.add('error');document.getElementById('eErr').classList.add('show');ok=false;}else{document.getElementById('loginEmail').classList.remove('error');document.getElementById('eErr').classList.remove('show');}
  if(!pw){document.getElementById('loginPw').classList.add('error');document.getElementById('pErr').classList.add('show');ok=false;}else{document.getElementById('loginPw').classList.remove('error');document.getElementById('pErr').classList.remove('show');}
  if(!ok)return;
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Login ho raha hai...';eb.style.display='none';
  try{await setPersistence(auth,rem?browserLocalPersistence:browserSessionPersistence);const c=await signInWithEmailAndPassword(auth,email,pw);toast('Login successful!');await redir(c.user.uid);}
  catch(err){const m={'auth/user-not-found':'Email registered nahi.','auth/wrong-password':'Password galat.','auth/invalid-credential':'Email ya password galat.','auth/too-many-requests':'Bahut attempts. Baad mein try karo.'};eb.textContent=m[err.code]||err.message;eb.style.display='block';btn.disabled=false;btn.innerHTML='Login karein →';}
});
window.loginWithGoogle=async()=>{const btn=document.getElementById('googleBtn');btn.disabled=true;btn.innerHTML='<span class="spinner spinner-white"></span> Connecting...';
  try{const r=await signInWithPopup(auth,new GoogleAuthProvider());toast('Google login!');await redir(r.user.uid);}
  catch(e){if(e.code!=='auth/popup-closed-by-user')toast('Google login failed.','error');btn.disabled=false;btn.innerHTML='Google se Login karo';}
};
</script>
</body>
</html>
