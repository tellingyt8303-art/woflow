<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Reset — WaFlow</title>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-grid-bg"></div>
  <div class="auth-glow"></div>
  <div class="auth-card fade-up">
    <a href="index.html" class="auth-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#00e676"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      <span>WaFlow</span>
    </a>
    <div class="card">
      <!-- Step 1: Email form -->
      <div id="step1">
        <div style="font-size:40px;margin-bottom:16px">🔐</div>
        <h1 class="auth-heading">Password Reset</h1>
        <p class="auth-sub">Apna registered email daalo — hum reset link bhejenge.</p>
        <form id="resetForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
              <input type="email" id="resetEmail" class="form-input has-icon" placeholder="aap@business.com" required/>
            </div>
            <div class="form-error" id="resetEmailError">Valid email daalo</div>
          </div>
          <div id="resetError" style="display:none;background:#ff3d5714;border:1px solid #ff3d5730;border-radius:8px;padding:11px 14px;color:var(--red);font-size:13px;margin-bottom:16px"></div>
          <button type="submit" class="btn btn-primary btn-full" id="resetBtn">Reset Link Bhejo →</button>
        </form>
      </div>
      <!-- Step 2: Success -->
      <div id="step2" style="display:none;text-align:center;padding:20px 0">
        <div style="font-size:56px;margin-bottom:16px">📧</div>
        <h2 style="font-family:var(--font-d);color:var(--white);margin-bottom:10px">Email Bhej Diya!</h2>
        <p style="color:var(--muted);margin-bottom:24px">Apna inbox check karein. Reset link 5 minutes mein expire ho jaata hai.</p>
        <a href="login.html" class="btn btn-outline">Login Page Par Jaayein</a>
      </div>
      <p class="auth-footer"><a href="login.html">← Wapis Login</a></p>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script type="module">
import { auth } from "./firebase-config.js";
import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email  = document.getElementById('resetEmail').value.trim();
  const errBox = document.getElementById('resetError');
  const btn    = document.getElementById('resetBtn');
  if (!email || !/\S+@\S+\.\S+/.test(email)) {
    document.getElementById('resetEmail').classList.add('error');
    document.getElementById('resetEmailError').classList.add('show');
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Bhej raha hai...';
  errBox.style.display = 'none';
  try {
    await sendPasswordResetEmail(auth, email);
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
  } catch (err) {
    const messages = {
      'auth/user-not-found': 'Yeh email registered nahi hai.',
      'auth/too-many-requests': 'Bahut zyada requests. Thodi der baad try karein.',
    };
    errBox.textContent = messages[err.code] || err.message;
    errBox.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Reset Link Bhejo →';
  }
});
</script>
</body>
</html>
