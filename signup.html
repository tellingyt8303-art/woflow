<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — WaFlow</title>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-grid-bg"></div>
  <div class="auth-glow"></div>

  <div class="auth-card fade-up" style="max-width:460px">
    <!-- Logo -->
    <a href="index.html" class="auth-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#00e676"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      <span>WaFlow</span>
    </a>

    <div class="card">
      <h1 class="auth-heading">Account banayein</h1>
      <p class="auth-sub">14-day free trial. No credit card needed.</p>

      <!-- Google -->
      <button class="btn google-btn" id="googleBtn" onclick="signupWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5.1l-6.3-5.1C29.3 35.3 26.8 36 24 36c-5.2 0-9.6-3.3-11.2-8H6.2C9.5 39.4 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.2-2.3 4.1-4.3 5.4l6.3 5.1C40.9 35.3 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
        Google se Sign up karo
      </button>

      <div class="auth-divider">ya email se</div>

      <form id="signupForm" novalidate>
        <div class="grid-2" style="gap:14px">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Aapka Naam *</label>
            <input type="text" id="signupName" class="form-input" placeholder="Rahul Sharma" autocomplete="name"/>
            <div class="form-error" id="nameError">Naam daalo</div>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Business Naam *</label>
            <input type="text" id="signupBusiness" class="form-input" placeholder="Mera Business" autocomplete="organization"/>
            <div class="form-error" id="businessError">Business naam daalo</div>
          </div>
        </div>

        <div class="form-group" style="margin-top:16px">
          <label class="form-label">Email Address *</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
            <input type="email" id="signupEmail" class="form-input has-icon" placeholder="rahul@business.com" autocomplete="email"/>
          </div>
          <div class="form-error" id="emailError">Valid email address daalo</div>
        </div>

        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.1 1.22 2 2 0 012.11 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92v2z"/></svg>
            <input type="tel" id="signupPhone" class="form-input has-icon" placeholder="+91 98765 43210" autocomplete="tel"/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password *</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="signupPassword" class="form-input has-icon" placeholder="Min 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
            <button type="button" class="password-toggle" onclick="togglePassword('signupPassword', this)">👁</button>
          </div>
          <div class="strength-bar" id="strengthBar">
            <div class="strength-seg" id="s1"></div>
            <div class="strength-seg" id="s2"></div>
            <div class="strength-seg" id="s3"></div>
            <div class="strength-seg" id="s4"></div>
          </div>
          <div id="strengthText" style="font-size:11px;color:var(--muted);margin-top:4px"></div>
          <div class="form-error" id="passwordError">Min 8 characters chahiye</div>
        </div>

        <div class="form-group">
          <label class="form-label">Password Confirm *</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="signupConfirm" class="form-input has-icon" placeholder="Password dobara daalo" autocomplete="new-password"/>
            <button type="button" class="password-toggle" onclick="togglePassword('signupConfirm', this)">👁</button>
          </div>
          <div class="form-error" id="confirmError">Passwords match nahi kar rahe</div>
        </div>

        <!-- Terms -->
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:20px">
          <input type="checkbox" id="agreeTerms" style="accent-color:var(--green);width:14px;height:14px;margin-top:3px;flex-shrink:0"/>
          <label for="agreeTerms" style="font-size:13px;color:var(--muted);cursor:pointer;line-height:1.5">
            Main <a href="terms.html" style="color:var(--green)">Terms & Conditions</a> aur <a href="privacy.html" style="color:var(--green)">Privacy Policy</a> se agree karta/karti hoon
          </label>
        </div>
        <div class="form-error" id="termsError" style="margin-bottom:12px">Terms accept karna zaroori hai</div>

        <!-- Error -->
        <div id="signupError" style="display:none;background:#ff3d5714;border:1px solid #ff3d5730;border-radius:8px;padding:11px 14px;color:var(--red);font-size:13px;margin-bottom:16px"></div>

        <button type="submit" class="btn btn-primary btn-full" id="signupBtn">
          Account Banayein →
        </button>
      </form>

      <p class="auth-footer">
        Already account hai? <a href="login.html">Login karein</a>
      </p>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { auth, db }           from "./firebase-config.js";
import { redirectIfLoggedIn } from "./auth-guard.js";
import {
  createUserWithEmailAndPassword,
  updateProfile,
  GoogleAuthProvider,
  signInWithPopup,
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc, setDoc, serverTimestamp,
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

redirectIfLoggedIn();

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

window.togglePassword = (id, btn) => {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
};

// ── Password strength ────────────────────────────────────────
window.checkStrength = (pw) => {
  let score = 0;
  const checks = [pw.length >= 8, /[A-Z]/.test(pw), /[0-9]/.test(pw), /[^A-Za-z0-9]/.test(pw)];
  score = checks.filter(Boolean).length;
  const colors = ['','#ff3d57','#ffc947','#4d9fff','#00e676'];
  const labels = ['','Weak','Fair','Good','Strong'];
  for (let i = 1; i <= 4; i++) {
    document.getElementById(`s${i}`).style.background = i <= score ? colors[score] : 'var(--border)';
  }
  document.getElementById('strengthText').textContent = score > 0 ? labels[score] : '';
  document.getElementById('strengthText').style.color = colors[score] || 'var(--muted)';
};

// ── Create user in Firestore ─────────────────────────────────
async function createUserDoc(uid, data) {
  // Users collection
  await setDoc(doc(db, 'users', uid), {
    uid,
    name:         data.name,
    email:        data.email,
    phone:        data.phone || '',
    business_name: data.business,
    role:         'user',
    plan:         'trial',
    plan_expires: new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString(),
    wa_connected: false,
    created_at:   serverTimestamp(),
    updated_at:   serverTimestamp(),
  });
  // Clients collection
  await setDoc(doc(db, 'clients', uid), {
    firebase_uid:  uid,
    name:          data.name,
    email:         data.email,
    business_name: data.business,
    phone:         data.phone || '',
    active:        true,
    wa_connected:  false,
    meta_phone_number_id: null,
    meta_access_token:    null,
    whatsapp_number:      null,
    created_at:    serverTimestamp(),
  });
}

// ── Email Signup ─────────────────────────────────────────────
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name     = document.getElementById('signupName').value.trim();
  const business = document.getElementById('signupBusiness').value.trim();
  const email    = document.getElementById('signupEmail').value.trim();
  const phone    = document.getElementById('signupPhone').value.trim();
  const password = document.getElementById('signupPassword').value;
  const confirm  = document.getElementById('signupConfirm').value;
  const agreed   = document.getElementById('agreeTerms').checked;
  const errBox   = document.getElementById('signupError');
  const btn      = document.getElementById('signupBtn');

  // Validate
  let ok = true;
  const show = (id, show) => document.getElementById(id).classList[show ? 'add' : 'remove']('show');
  const err  = (id, show) => document.getElementById(id).classList[show ? 'add' : 'remove']('error');

  if (!name)                         { show('nameError', true);  err('signupName', true);  ok = false; } else { show('nameError', false); err('signupName', false); }
  if (!business)                     { show('businessError', true); err('signupBusiness', true); ok = false; } else { show('businessError', false); err('signupBusiness', false); }
  if (!email || !/\S+@\S+\.\S+/.test(email)) { show('emailError', true); err('signupEmail', true); ok = false; } else { show('emailError', false); err('signupEmail', false); }
  if (password.length < 8)           { show('passwordError', true); err('signupPassword', true); ok = false; } else { show('passwordError', false); err('signupPassword', false); }
  if (password !== confirm)          { show('confirmError', true); err('signupConfirm', true); ok = false; } else { show('confirmError', false); err('signupConfirm', false); }
  if (!agreed)                       { show('termsError', true); ok = false; } else { show('termsError', false); }
  if (!ok) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Account ban raha hai...';
  errBox.style.display = 'none';

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    await createUserDoc(cred.user.uid, { name, business, email, phone });
    toast('Account ban gaya! Dashboard khul raha hai...');
    setTimeout(() => window.location.href = 'dashboard.html', 1000);
  } catch (err) {
    const messages = {
      'auth/email-already-in-use': 'Yeh email already registered hai. Login karein.',
      'auth/weak-password':        'Password zyada strong banayein.',
      'auth/invalid-email':        'Email format sahi nahi hai.',
    };
    errBox.textContent = messages[err.code] || err.message;
    errBox.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Account Banayein →';
  }
});

// ── Google Signup ────────────────────────────────────────────
window.signupWithGoogle = async () => {
  const btn = document.getElementById('googleBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner spinner-white"></span> Google se connecting...';
  try {
    const result = await signInWithPopup(auth, new GoogleAuthProvider());
    const user   = result.user;
    // Create user doc if new
    const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) {
      const nameParts = (user.displayName || 'User').split(' ');
      await createUserDoc(user.uid, {
        name:     user.displayName || 'User',
        business: nameParts[0] + ' Business',
        email:    user.email,
        phone:    user.phoneNumber || '',
      });
    }
    toast('Google signup successful!');
    window.location.href = 'dashboard.html';
  } catch (err) {
    if (err.code !== 'auth/popup-closed-by-user') toast('Google signup failed. Try karein.', 'error');
    btn.disabled = false;
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/></svg> Google se Sign up karo`;
  }
};
</script>
</body>
</html>
