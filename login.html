<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — WaFlow</title>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-grid-bg"></div>
  <div class="auth-glow"></div>

  <div class="auth-card fade-up">

    <!-- Logo -->
    <a href="index.html" class="auth-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#00e676"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      <span>WaFlow</span>
    </a>

    <!-- Card -->
    <div class="card">
      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-sub">Apne WaFlow account mein login karein</p>

      <!-- Google Login -->
      <button class="btn google-btn" id="googleBtn" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5.1l-6.3-5.1C29.3 35.3 26.8 36 24 36c-5.2 0-9.6-3.3-11.2-8H6.2C9.5 39.4 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.2-2.3 4.1-4.3 5.4l6.3 5.1C40.9 35.3 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
        Google se Login karo
      </button>

      <div class="auth-divider">ya email se</div>

      <!-- Email Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
            <input type="email" id="loginEmail" class="form-input has-icon" placeholder="aap@business.com" autocomplete="email"/>
          </div>
          <div class="form-error" id="emailError">Valid email address daalo</div>
        </div>

        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <label class="form-label" style="margin:0">Password</label>
            <a href="forgot-password.html" style="font-size:12px;color:var(--green);text-decoration:none">Bhool gaye?</a>
          </div>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="loginPassword" class="form-input has-icon" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">👁</button>
          </div>
          <div class="form-error" id="passwordError">Password daalo</div>
        </div>

        <!-- Remember me -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
          <input type="checkbox" id="rememberMe" style="accent-color:var(--green);width:14px;height:14px"/>
          <label for="rememberMe" style="font-size:13px;color:var(--muted);cursor:pointer">Mujhe yaad rakho</label>
        </div>

        <!-- Error message -->
        <div id="loginError" style="display:none;background:#ff3d5714;border:1px solid #ff3d5730;border-radius:8px;padding:11px 14px;color:var(--red);font-size:13px;margin-bottom:16px"></div>

        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          Login karein →
        </button>
      </form>

      <p class="auth-footer">
        Account nahi hai? <a href="signup.html">Sign up karein</a>
      </p>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script type="module">
import { auth, db }        from "./firebase-config.js";
import { redirectIfLoggedIn } from "./auth-guard.js";
import {
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  setPersistence,
  browserLocalPersistence,
  browserSessionPersistence,
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Already logged in? Redirect
redirectIfLoggedIn();

// ── Toast ────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── Toggle password ───────────────────────────────────────────
window.togglePassword = (id, btn) => {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
};

// ── Post-login redirect based on role ────────────────────────
async function redirectByRole(uid) {
  const snap = await getDoc(doc(db, 'users', uid));
  const role = snap.exists() ? snap.data().role : 'user';
  window.location.href = role === 'admin' ? 'admin.html' : 'dashboard.html';
}

// ── Email Login ───────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const remember = document.getElementById('rememberMe').checked;
  const errBox   = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');

  // Validation
  let valid = true;
  if (!email || !/\S+@\S+\.\S+/.test(email)) {
    document.getElementById('loginEmail').classList.add('error');
    document.getElementById('emailError').classList.add('show');
    valid = false;
  } else {
    document.getElementById('loginEmail').classList.remove('error');
    document.getElementById('emailError').classList.remove('show');
  }
  if (!password) {
    document.getElementById('loginPassword').classList.add('error');
    document.getElementById('passwordError').classList.add('show');
    valid = false;
  } else {
    document.getElementById('loginPassword').classList.remove('error');
    document.getElementById('passwordError').classList.remove('show');
  }
  if (!valid) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Login ho raha hai...';
  errBox.style.display = 'none';

  try {
    const persistence = remember ? browserLocalPersistence : browserSessionPersistence;
    await setPersistence(auth, persistence);
    const cred = await signInWithEmailAndPassword(auth, email, password);
    toast('Login successful! Redirect ho raha hai...');
    await redirectByRole(cred.user.uid);
  } catch (err) {
    const messages = {
      'auth/user-not-found':   'Yeh email registered nahi hai.',
      'auth/wrong-password':   'Password galat hai.',
      'auth/invalid-credential':'Email ya password galat hai.',
      'auth/too-many-requests':'Bahut zyada attempts. Thodi der baad try karein.',
      'auth/user-disabled':    'Aapka account disabled kar diya gaya hai.',
    };
    errBox.textContent = messages[err.code] || `Error: ${err.message}`;
    errBox.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Login karein →';
  }
});

// ── Google Login ──────────────────────────────────────────────
window.loginWithGoogle = async () => {
  const provider = new GoogleAuthProvider();
  const btn = document.getElementById('googleBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner spinner-white"></span> Opening Google...';
  try {
    const result = await signInWithPopup(auth, provider);
    toast('Google se login successful!');
    await redirectByRole(result.user.uid);
  } catch (err) {
    if (err.code !== 'auth/popup-closed-by-user') {
      toast('Google login mein problem aayi. Try karein.', 'error');
    }
    btn.disabled = false;
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5.1l-6.3-5.1C29.3 35.3 26.8 36 24 36c-5.2 0-9.6-3.3-11.2-8H6.2C9.5 39.4 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.2-2.3 4.1-4.3 5.4l6.3 5.1C40.9 35.3 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/></svg> Google se Login karo`;
  }
};
</script>
</body>
</html>
